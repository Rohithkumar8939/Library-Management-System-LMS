<!DOCTYPE html>
<html>

<head>
    <title>Library Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
{% extends 'base.html' %}
   {% load static %} 
  
<style>
    body{
        background-image: url("{% static 'images/library logo.jpeg' %}") ;
    }
    
</style>

<body >

    
    {% block content %}

    <div class="card p-4 col-md-4 mx-auto">
        <h3>Login</h3>

        <form method="post" style="padding-top: 10px;">
            {% csrf_token %}
            <input name="username" class="form-control mb-2" placeholder="Username">
            <input name="password" type="password" class="form-control mb-2" placeholder="Password">
            <button class="btn btn-primary w-100">Login</button>
        </form>

        <a href="{% url 'register' %}">Create account</a>

    </div>

    {% endblock %}

</body>

</html>
